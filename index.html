<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نظام الدور</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Tahomа,Arial;
background:#0f172a;
color:white;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.logo{
width:70px;
margin-bottom:10px;
}

.ticket-box{
background:#020617;
border-radius:25px;
padding:30px;
margin-top:10px;
border:2px solid #334155;
}

.ticket-label{
font-size:22px;
margin-bottom:10px;
}

.ticket-number{
font-size:150px;
font-weight:bold;
color:#38bdf8;
}

.note{
margin-top:15px;
font-size:18px;
}

button{
padding:12px 20px;
font-size:16px;
border:none;
border-radius:10px;
cursor:pointer;
}

.controls{
margin-top:20px;
}

#nextBtn{background:#2563eb;color:white;}
#backBtn{background:#e5e7eb;color:black;}
#repeatBtn{background:#64748b;color:white;}
#resetBtn{background:#ef4444;color:white;}

#enableSoundBtn{
background:#22c55e;
color:white;
margin-bottom:15px;
}

input{
padding:10px;
border-radius:10px;
border:none;
width:60%;
margin-top:10px;
}

footer{
margin-top:30px;
font-size:12px;
color:#94a3b8;
}

</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h2>يرجى التوجه إلى غرفة التجهيز</h2>

<div class="ticket-box">

<button id="enableSoundBtn">🔊 تفعيل الصوت</button>

<div class="ticket-label">رقم العميل</div>

<div id="currentNumber" class="ticket-number">0</div>

</div>

<div class="note" id="clientNote"></div>

<audio id="callSound" src="yaqoob.mp3"></audio>

<div class="controls">

<button id="nextBtn">نداء العميل التالي</button>

<button id="backBtn">رجوع للعميل السابق</button>

<br><br>

<button id="repeatBtn">إعادة نداء نفس العميل</button>

<button id="resetBtn">إعادة تعيين الأرقام</button>

</div>

<br>

<input id="noteInput" placeholder="اكتب رسالة تظهر للعملاء">

<button id="updateNote">تحديث الرسالة</button>

<footer>
جميع الحقوق محفوظة لـ يحيى آل عبدالسلام – 95359513
</footer>

</div>

<script>

const currentEl=document.getElementById("currentNumber")
const nextBtn=document.getElementById("nextBtn")
const backBtn=document.getElementById("backBtn")
const repeatBtn=document.getElementById("repeatBtn")
const resetBtn=document.getElementById("resetBtn")

const callSound=document.getElementById("callSound")
const enableSoundBtn=document.getElementById("enableSoundBtn")

const noteInput=document.getElementById("noteInput")
const clientNote=document.getElementById("clientNote")

let history=[]

function getNumber(){
return Number(localStorage.getItem("number")||0)
}

function setNumber(n){
localStorage.setItem("number",n)
currentEl.textContent=n
}

setNumber(getNumber())

nextBtn.onclick=()=>{

let n=getNumber()

if(n>0)history.push(n)

n++

setNumber(n)

callSound.play()

}

backBtn.onclick=()=>{

if(history.length===0)return

let n=history.pop()

setNumber(n)

callSound.play()

}

repeatBtn.onclick=()=>{
callSound.play()
}

resetBtn.onclick=()=>{

if(confirm("إعادة الأرقام للصفر؟")){

history=[]

setNumber(0)

}

}

enableSoundBtn.onclick=()=>{

callSound.play()

callSound.pause()

callSound.currentTime=0

enableSoundBtn.style.display="none"

}

document.getElementById("updateNote").onclick=()=>{

let txt=noteInput.value

clientNote.textContent=txt

localStorage.setItem("note",txt)

}

clientNote.textContent=localStorage.getItem("note")||""

</script>

</body>
</html>
